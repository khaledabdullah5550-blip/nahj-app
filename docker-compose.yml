version: '3.8'

services:
  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=development
      - AWS_REGION=me-central-1
      - DYNAMODB_ENDPOINT=http://dynamodb-local:8000
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
      - DYNAMODB_USERS_TABLE=nahj-local-users
      - DYNAMODB_TRANSACTIONS_TABLE=nahj-local-transactions
      - DYNAMODB_AUDIT_TABLE=nahj-local-audit-logs
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      dynamodb-local:
        condition: service_healthy
    command: npm run dev
    networks:
      - nahj-network

  # Local DynamoDB
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    ports:
      - '8000:8000'
    volumes:
      - dynamodb-data:/home/dynamodblocal/data
    command: '-jar DynamoDBLocal.jar -sharedDb -dbPath /home/dynamodblocal/data'
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:8000/shell/ || exit 1']
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - nahj-network

  # DynamoDB Admin UI
  dynamodb-admin:
    image: aaronshaf/dynamodb-admin:latest
    ports:
      - '8001:8001'
    environment:
      - DYNAMO_ENDPOINT=http://dynamodb-local:8000
      - AWS_REGION=me-central-1
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
    depends_on:
      - dynamodb-local
    networks:
      - nahj-network

  # DynamoDB Table Bootstrapper
  dynamodb-setup:
    image: amazon/aws-cli:latest
    depends_on:
      dynamodb-local:
        condition: service_healthy
    environment:
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
      - AWS_DEFAULT_REGION=me-central-1
    entrypoint: >
      /bin/sh -c "
      aws dynamodb create-table
        --table-name nahj-local-users
        --attribute-definitions AttributeName=userId,AttributeType=S AttributeName=email,AttributeType=S
        --key-schema AttributeName=userId,KeyType=HASH
        --global-secondary-indexes '[{\"IndexName\":\"email-index\",\"KeySchema\":[{\"AttributeName\":\"email\",\"KeyType\":\"HASH\"}],\"Projection\":{\"ProjectionType\":\"ALL\"}}]'
        --billing-mode PAY_PER_REQUEST
        --endpoint-url http://dynamodb-local:8000 2>/dev/null || true &&

      aws dynamodb create-table
        --table-name nahj-local-transactions
        --attribute-definitions AttributeName=transactionId,AttributeType=S AttributeName=userId,AttributeType=S AttributeName=createdAt,AttributeType=S
        --key-schema AttributeName=transactionId,KeyType=HASH AttributeName=userId,KeyType=RANGE
        --global-secondary-indexes '[{\"IndexName\":\"userId-createdAt-index\",\"KeySchema\":[{\"AttributeName\":\"userId\",\"KeyType\":\"HASH\"},{\"AttributeName\":\"createdAt\",\"KeyType\":\"RANGE\"}],\"Projection\":{\"ProjectionType\":\"ALL\"}}]'
        --billing-mode PAY_PER_REQUEST
        --endpoint-url http://dynamodb-local:8000 2>/dev/null || true &&

      aws dynamodb create-table
        --table-name nahj-local-audit-logs
        --attribute-definitions AttributeName=logId,AttributeType=S AttributeName=timestamp,AttributeType=S
        --key-schema AttributeName=logId,KeyType=HASH AttributeName=timestamp,KeyType=RANGE
        --billing-mode PAY_PER_REQUEST
        --endpoint-url http://dynamodb-local:8000 2>/dev/null || true &&

      echo 'DynamoDB tables created successfully!'
      "
    networks:
      - nahj-network

volumes:
  dynamodb-data:
    driver: local

networks:
  nahj-network:
    driver: bridge
