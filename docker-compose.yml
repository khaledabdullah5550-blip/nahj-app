version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=development
      - AWS_REGION=me-central-1
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
      - AWS_ENDPOINT_URL=http://dynamodb-local:8000
      - DYNAMODB_USERS_TABLE=nahj-users
      - DYNAMODB_TRANSACTIONS_TABLE=nahj-transactions
      - DYNAMODB_AUDIT_TABLE=nahj-audit-logs
    command: npm run dev
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - dynamodb-local
    networks:
      - nahj-network

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    ports:
      - '8000:8000'
    command: '-jar DynamoDBLocal.jar -sharedDb -inMemory'
    networks:
      - nahj-network

  dynamodb-admin:
    image: aaronshaf/dynamodb-admin:latest
    ports:
      - '8001:8001'
    environment:
      - DYNAMO_ENDPOINT=http://dynamodb-local:8000
      - AWS_REGION=me-central-1
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
    depends_on:
      - dynamodb-local
    networks:
      - nahj-network

networks:
  nahj-network:
    driver: bridge
