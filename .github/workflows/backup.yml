name: Weekly Firestore Backup
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install backup script dependencies
        working-directory: scripts
        run: npm install
      - name: Run backup
        working-directory: scripts
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_NAHJ_APP_664F5 }}
        run: node backup-firestore.js
      - name: Commit backup file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/
          git diff --staged --quiet || git commit -m "backup"
          git push
